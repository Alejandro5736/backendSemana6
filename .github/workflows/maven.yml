name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Make mvnw executable
      working-directory: ./backendSemana6
      run: chmod +x mvnw

    - name: Run Tests with Maven
      working-directory: ./backendSemana6
      run: ./mvnw test